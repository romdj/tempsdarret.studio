# Temps D'arrêt - Unified CI/CD Pipeline
# Comprehensive build, test, and quality checks
name: CI/CD Pipeline

on:
  push:
    branches: [main, 'feat/*', 'fix/*', 'hotfix/*']
  pull_request:
    branches: [main]

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # 📋 QUALITY CHECKS (Fast - runs first)
  # ==========================================================================

  quality-checks:
    name: 🔍 Quality • Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10


      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint all services
        run: pnpm run lint

      - name: Build shared packages
        run: pnpm run build:models && pnpm run build:shared

      - name: Type check all services
        run: pnpm run check

      - name: Check for circular dependencies
        run: npx madge --circular services/ --extensions ts || echo "No circular deps"
        continue-on-error: true

  # ==========================================================================
  # 🏗️ BUILD & UNIT TESTS (Parallel by component)
  # ==========================================================================

  build-and-unit-test:
    name: 🏗️ Build & Unit • ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: quality-checks
    strategy:
      fail-fast: false
      matrix:
        component:
          - models
          - shared
          - user-service
          - invitation-service
          - portfolio-service
          - shoot-service
          - file-service
          - notification-service
          - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10


      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared dependencies
        if: ${{ !contains(fromJson('["models", "shared"]'), matrix.component) }}
        run: pnpm run build:models && pnpm run build:shared

      - name: Build ${{ matrix.component }}
        run: pnpm run build:${{ matrix.component }}

      - name: Run unit tests
        run: |
          if [ "${{ matrix.component }}" = "models" ] || [ "${{ matrix.component }}" = "shared" ]; then
            cd packages/${{ matrix.component }} && pnpm run test:unit || npm test || echo "No unit tests for ${{ matrix.component }}"
          elif [ "${{ matrix.component }}" = "frontend" ]; then
            cd frontend && pnpm run test:unit || npm test || echo "No unit tests for frontend"
          else
            cd services/${{ matrix.component }} && pnpm run test:unit
          fi
        env:
          NODE_ENV: test

      - name: Cache build artifacts
        uses: actions/cache/save@v5
        with:
          path: |
            services/${{ matrix.component }}/dist
            packages/${{ matrix.component }}/dist
            frontend/build
          key: build-${{ matrix.component }}-${{ github.sha }}

  # ==========================================================================
  # 🧪 COMPONENT TESTS (With Docker services)
  # ==========================================================================

  component-tests:
    name: 🧪 Component • ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-unit-test

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - invitation-service
          - portfolio-service
          - shoot-service
          - file-service
          - notification-service

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10


      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run component tests
        run: cd services/${{ matrix.service }} && pnpm run test:component
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://test:test@localhost:27017/${{ matrix.service }}-test?authSource=admin
          MONGO_TEST_BASE_URI: mongodb://test:test@localhost:27017
          KAFKA_BROKERS: localhost:9092
          REDIS_URL: redis://localhost:6379/0

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: component-test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ==========================================================================
  # 🔗 INTEGRATION TESTS (With Docker services)
  # ==========================================================================

  integration-tests:
    name: 🔗 Integration • ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-unit-test

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - invitation-service
          - portfolio-service
          - shoot-service
          - file-service
          - notification-service

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10


      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: cd services/${{ matrix.service }} && pnpm run test:integration
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://test:test@localhost:27017/${{ matrix.service }}-integration?authSource=admin
          MONGO_TEST_BASE_URI: mongodb://test:test@localhost:27017
          KAFKA_BROKERS: localhost:9092
          REDIS_URL: redis://localhost:6379/1

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: integration-test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ==========================================================================
  # 📜 CONTRACT TESTS
  # ==========================================================================

  contract-tests:
    name: 📜 Contract • ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-unit-test

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - invitation-service
          - portfolio-service
          - shoot-service
          - file-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10


      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run contract tests
        run: cd services/${{ matrix.service }} && pnpm run test:contract
        env:
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: contract-test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ==========================================================================
  # 📊 CODE COVERAGE (Aggregated)
  # ==========================================================================

  coverage:
    name: 📊 Coverage • All Services
    runs-on: ubuntu-latest
    needs: [component-tests, integration-tests, contract-tests]

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10


      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run coverage for all services
        run: |
          for service in user-service invitation-service portfolio-service shoot-service file-service notification-service; do
            echo "Running coverage for $service..."
            cd services/$service
            pnpm run test:coverage || echo "No coverage for $service"
            cd ../..
          done
        continue-on-error: true
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://test:test@localhost:27017/coverage-test?authSource=admin
          REDIS_URL: redis://localhost:6379/2

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: services/*/coverage/lcov.info
          flags: services
          name: all-services-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-reports
          path: services/*/coverage/
          retention-days: 30
          if-no-files-found: ignore

  # ==========================================================================
  # 🔒 SECURITY & DEPENDENCY AUDIT
  # ==========================================================================

  security-audit:
    name: 🔒 Security • Audit & Vulnerabilities
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10


      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: pnpm outdated || echo "Some dependencies are outdated"
        continue-on-error: true

  # ==========================================================================
  # ✅ FINAL STATUS (Required checks summary)
  # ==========================================================================

  ci-success:
    name: ✅ CI Pipeline • Status
    runs-on: ubuntu-latest
    needs:
      - quality-checks
      - build-and-unit-test
      - component-tests
      - integration-tests
      - contract-tests
      - coverage
      - security-audit
    if: always()

    steps:
      - name: Check pipeline status
        run: |
          echo "========================================="
          echo "CI/CD Pipeline Summary"
          echo "========================================="
          echo "Quality Checks: ${{ needs.quality-checks.result }}"
          echo "Build & Unit Tests: ${{ needs.build-and-unit-test.result }}"
          echo "Component Tests: ${{ needs.component-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Contract Tests: ${{ needs.contract-tests.result }}"
          echo "Coverage: ${{ needs.coverage.result }}"
          echo "Security: ${{ needs.security-audit.result }}"
          echo "========================================="

          # Fail if any critical job failed
          if [ "${{ needs.quality-checks.result }}" != "success" ]; then
            echo "❌ Quality checks failed"
            exit 1
          fi
          if [ "${{ needs.build-and-unit-test.result }}" != "success" ]; then
            echo "❌ Build & unit tests failed"
            exit 1
          fi
          if [ "${{ needs.component-tests.result }}" != "success" ]; then
            echo "❌ Component tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.contract-tests.result }}" != "success" ]; then
            echo "❌ Contract tests failed"
            exit 1
          fi

          echo "✅ All critical checks passed!"

  # ==========================================================================
  # 🚀 DEPLOYMENT READINESS (Only on main)
  # ==========================================================================

  deployment-ready:
    name: 🚀 Ready for Deployment
    runs-on: ubuntu-latest
    needs: ci-success
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment readiness check
        run: |
          echo "✅ All checks passed - Ready for deployment"
          echo "📦 Services built and tested"
          echo "🐳 Docker images ready"
          echo "🔒 Security audit complete"
          echo ""
          echo "Next steps:"
          echo "  - Deploy to staging: manual trigger"
          echo "  - Deploy to production: manual approval required"
